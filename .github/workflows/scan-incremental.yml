name: Scan Incremental

# Scan rápido que usa Drive Changes API — procesa solo lo que cambió desde
# el último run. Tarda segundos, corre cada 2 min para latencia mínima.
# El scan completo (scan.yml) sigue corriendo cada hora como backup.

on:
  schedule:
    - cron: '*/2 * * * *'   # cada 2 minutos
  workflow_dispatch: {}
  push:
    branches: [main]
    paths-ignore:
      - 'tracker.db'
      - '*.md'
      - '.gitignore'

# Lock: mismo grupo que scan.yml para que NUNCA corran en paralelo.
concurrency:
  group: scan-drive
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  scan:
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run incremental scan with notify
        env:
          # OAuth (Drive + Sheets)
          OAUTH_REFRESH_TOKEN: ${{ secrets.OAUTH_REFRESH_TOKEN }}
          OAUTH_CLIENT_ID: ${{ secrets.OAUTH_CLIENT_ID }}
          OAUTH_CLIENT_SECRET: ${{ secrets.OAUTH_CLIENT_SECRET }}
          # OAuth (Gmail send)
          MAIL_OAUTH_REFRESH_TOKEN: ${{ secrets.MAIL_OAUTH_REFRESH_TOKEN }}
          MAIL_OAUTH_CLIENT_ID: ${{ secrets.MAIL_OAUTH_CLIENT_ID }}
          MAIL_OAUTH_CLIENT_SECRET: ${{ secrets.MAIL_OAUTH_CLIENT_SECRET }}
          # Sheet
          SHEET_ID: ${{ secrets.SHEET_ID }}
          SHEET_TAB: ${{ secrets.SHEET_TAB }}
          SHEET_HEADER_ROW: ${{ secrets.SHEET_HEADER_ROW }}
          SHEET_COL_PROJECT: ${{ secrets.SHEET_COL_PROJECT }}
          SHEET_COL_ASSIGNEE: ${{ secrets.SHEET_COL_ASSIGNEE }}
          # Contacto + branding
          ADMIN_EMAIL: ${{ secrets.ADMIN_EMAIL }}
          TEST_EMAIL: ${{ secrets.TEST_EMAIL }}
          BRAND_NAME: ${{ secrets.BRAND_NAME }}
          BRAND_TAGLINE: ${{ secrets.BRAND_TAGLINE }}
          MAIL_FROM_NAME: ${{ secrets.MAIL_FROM_NAME }}
          MAIL_FROM_ADDRESS: ${{ secrets.MAIL_FROM_ADDRESS }}
          DASHBOARD_URL: ${{ secrets.DASHBOARD_URL }}
          # Vocabulario
          INPUT_SINGULAR: ${{ secrets.INPUT_SINGULAR }}
          INPUT_PLURAL: ${{ secrets.INPUT_PLURAL }}
          OUTPUT_SINGULAR: ${{ secrets.OUTPUT_SINGULAR }}
          OUTPUT_PLURAL: ${{ secrets.OUTPUT_PLURAL }}
          ASSIGNEE_SINGULAR: ${{ secrets.ASSIGNEE_SINGULAR }}
          ASSIGNEE_PLURAL: ${{ secrets.ASSIGNEE_PLURAL }}
          PROJECT_SINGULAR: ${{ secrets.PROJECT_SINGULAR }}
          PROJECT_PLURAL: ${{ secrets.PROJECT_PLURAL }}
          INPUT_FOLDER_NAMES: ${{ secrets.INPUT_FOLDER_NAMES }}
          INPUT_EXTS: ${{ secrets.INPUT_EXTS }}
          # Push notifications
          VAPID_PRIVATE_KEY: ${{ secrets.VAPID_PRIVATE_KEY }}
          VAPID_SUBJECT: ${{ secrets.VAPID_SUBJECT }}
        run: |
          for i in 1 2 3; do
            python scan_incremental.py --notify && break
            ec=$?
            echo "Intento $i falló (exit $ec)"
            if [ $i -lt 3 ]; then sleep $((5 * i)); else exit $ec; fi
          done

      - name: Commit DB if changed
        run: |
          git config user.name "asistente-bot"
          git config user.email "bot@asistente.local"
          if git status --porcelain tracker.db | grep -q .; then
            git add tracker.db
            git commit -m "[bot-inc] update tracker.db ($(date -u +%Y-%m-%dT%H:%M:%SZ))"
            git pull --rebase
            git push
            echo "DB actualizada"
          else
            echo "DB sin cambios"
          fi
